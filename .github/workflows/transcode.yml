name: HLS Transcoder Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [build-hls]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  transcode:
    if: github.event_name == 'repository_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Transcoder
        env:
          TRANSCODER_PRIVATE_KEY: ${{ secrets.TRANSCODER_PRIVATE_KEY }}
          HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
          HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX }}
          HLS_CALLBACK_SECRET_STAGAPPS_PROD: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_PROD }}
        run: |
          echo "Callback URL: ${{ github.event.client_payload.callback_url }}"
          echo "Callback client: ${{ github.event.client_payload.callback_client_id }}"

          # Ghi payload ra file để script đọc trực tiếp, tránh rò rỉ qua ENV
          echo '${{ toJson(github.event.client_payload) }}' > payload.json

          # Chạy transcoder với file payload
          npx tsx src/index.ts payload.json
