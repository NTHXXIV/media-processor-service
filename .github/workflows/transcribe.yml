name: Media Transcription Service

on:
  repository_dispatch:
    types: [build-transcription]

jobs:
  transcribe:
    name: Whisper Transcription
    if: github.event.client_payload.stage != 'gemini'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Cache Whisper Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface 
          key: ${{ runner.os }}-whisper-models-${{ github.event.client_payload.model_size || 'medium' }}
          restore-keys: |
            ${{ runner.os }}-whisper-models-

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Run Phase 1 (Whisper)
        env:
          TRANSCODER_PRIVATE_KEY: ${{ secrets.TRANSCODER_PRIVATE_KEY }}
          HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
          ALLOWED_CALLBACK_DOMAINS: ${{ secrets.ALLOWED_CALLBACK_DOMAINS }}
          HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX }}
          HLS_CALLBACK_SECRET_STAGAPPS_PROD: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_PROD }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e "require('fs').writeFileSync('payload.json', process.env.PAYLOAD_JSON)"
          npx tsx src/transcribe/index.ts payload.json --stage=whisper

      - name: Prepare Artifact
        run: |
          # Use lesson_id if job_id is missing to find the directory
          ID="${{ github.event.client_payload.job_id || github.event.client_payload.lesson_id }}"
          mkdir -p ./dist-transcribe
          sudo cp /tmp/transcribe-job-$ID/intermediate.json ./dist-transcribe/
          cp payload.json ./dist-transcribe/

      - name: Upload Intermediate Data
        uses: actions/upload-artifact@v4
        with:
          name: transcribe-data-${{ github.event.client_payload.job_id || github.event.client_payload.lesson_id }}
          path: ./dist-transcribe/
          retention-days: 1

  post_process:
    name: Gemini Cleaning & Callback
    needs: transcribe
    if: |
      always() && 
      (needs.transcribe.result == 'success' || needs.transcribe.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Download Intermediate Data
        if: needs.transcribe.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: transcribe-data-${{ github.event.client_payload.job_id || github.event.client_payload.lesson_id }}
          path: ./dist-transcribe/ 

      - name: Restore Working Dir
        if: needs.transcribe.result == 'success'
        run: |
          ID="${{ github.event.client_payload.job_id || github.event.client_payload.lesson_id }}"
          TARGET_DIR="/tmp/transcribe-job-$ID"
          sudo mkdir -p "$TARGET_DIR"
          sudo cp ./dist-transcribe/* "$TARGET_DIR/"

      - name: Run Phase 2 (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRANSCODER_PRIVATE_KEY: ${{ secrets.TRANSCODER_PRIVATE_KEY }}
          HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
          ALLOWED_CALLBACK_DOMAINS: ${{ secrets.ALLOWED_CALLBACK_DOMAINS }}
          HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX }}
          HLS_CALLBACK_SECRET_STAGAPPS_PROD: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_PROD }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          # Use payload from artifact if exists, otherwise create from env
          if [ ! -f payload.json ]; then
            node -e "require('fs').writeFileSync('payload.json', process.env.PAYLOAD_JSON)"
          fi
          npx tsx src/transcribe/index.ts payload.json --stage=gemini
