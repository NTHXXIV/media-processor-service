name: Media Transcription Service

on:
  repository_dispatch:
    types: [build-transcription]

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ghi payload trực tiếp vào file mà không thông qua biến môi trường ENV công khai
      - name: Create Payload File
        run: |
          cat << 'EOF' > payload.json
          ${{ toJson(github.event.client_payload) }}
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Cache Whisper Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface 
          key: ${{ runner.os }}-whisper-models-${{ github.event.client_payload.model_size || 'medium' }}
          restore-keys: |
            ${{ runner.os }}-whisper-models-

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Run Transcriber
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRANSCODER_PRIVATE_KEY: ${{ secrets.TRANSCODER_PRIVATE_KEY }}
          HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
          ALLOWED_CALLBACK_DOMAINS: ${{ secrets.ALLOWED_CALLBACK_DOMAINS }}
          HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX }}
          HLS_CALLBACK_SECRET_STAGAPPS_PROD: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_PROD }}
        run: |
          npx tsx src/transcribe/index.ts payload.json
